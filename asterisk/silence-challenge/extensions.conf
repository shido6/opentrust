; OpenTrust SIP — Silence Challenge (Grace-Oriented)
; No DTMF, no "Press 7". Uses AMD to detect human voice activity.
; A human says "Hello?" and is passed through. A bot hangs up silently.
;
; "My yoke is easy, and my burden is light." — Matthew 11:30
;
; Place in /etc/asterisk/extensions.conf
; Requires: app_amd.so (built-in)

[opentrust-silence-challenge]

; Entry point for challenged calls — silence detection mode
; No interactive prompt. Just listen for voice activity.
exten => s,1,Answer()
    same => n,AMD(800,2000,500,1000,250,500,50,300)
    same => n,GotoIf($["${AMDSTATUS}" = "HUMAN"]?passed)
    same => n,GotoIf($["${AMDSTATUS}" = "MACHINE"]?failed)
    same => n,GotoIf($["${AMDSTATUS}" = "NOTSURE"]?passed)  ; Favor the caller on uncertainty

; Human detected — bridge to real destination with zero friction
exten => s,n(passed),Playback(silence/1)
    same => n,Dial(PJSIP/${EXTEN}@peer,30)
    same => n,Hangup()

; Machine detected — soft reject with graceful closure
exten => s,n(failed),Playback(beep)
    same => n,Playback(vm-goodbye)
    same => n,Hangup()

; Caller hung up during challenge
exten => h,1,NoOp(Silence challenge ended — AMDSTATUS: ${AMDSTATUS})
