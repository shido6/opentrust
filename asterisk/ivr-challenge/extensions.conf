; OpenTrust SIP — Asterisk IVR Challenge
; Place in /etc/asterisk/extensions.conf

[opentrust-challenge]

; Entry point for challenged calls
exten => s,1,Answer()
    same => n,Set(CHANNEL(language)=en)
    same => n,Read(CALLER_ENTERED,opentrust-challenge-prompt,,5)
    same => n,GotoIf($["${CALLER_ENTERED}" = ""]?timeout:verify)

; Caller entered digits — verify
exten => s,n(verify),NoOp(Challenge response: ${CALLER_ENTERED})
    same => n,Set(EXPECTED=${CHANNEL(call_id):0:4})
    same => n,GotoIf($["${CALLER_ENTERED}" = "${EXPECTED}"]?passed:failed)

; Passed — route call through
exten => s,n(passed),Playback(opentrust-challenge-passed)
    same => n,Hangup()

; Failed — send to voicemail or reject
exten => s,n(failed),Playback(opentrust-challenge-failed)
    same => n,Hangup()

; Timeout — no input received
exten => s,n(timeout),Playback(opentrust-challenge-timeout)
    same => n,Hangup()

; Caller hung up during challenge
exten => h,1,NoOp(Challenge call ended)
