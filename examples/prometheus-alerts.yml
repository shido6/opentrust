groups:
  - name: opentrust
    rules:
      - alert: HighFalsePositiveRate
        expr: rate(trust_false_positive_total[1h]) / rate(trust_decisions_total[1h]) > 0.01
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "False positive rate above 1%"

      - alert: HighAPILatency
        expr: histogram_quantile(0.99, rate(trust_latency_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "p99 API latency above 500ms"

      - alert: DNODrain
        expr: time() - max(dno_entry_last_updated) > 172800
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "DNO table stale — no update in 48h"

      - alert: SlowRedress
        expr: histogram_quantile(0.95, trust_redress_time_hours_bucket[7d]) > 4
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "p95 redress resolution time above 4 hours"

      - alert: DecisionThroughputDrop
        expr: rate(trust_decisions_total[5m]) / rate(trust_decisions_total[10m] offset 1h) < 0.5
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Decision throughput dropped >50%"

      - alert: APIUnreachable
        expr: up{job="opentrust-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Trust API is down"
