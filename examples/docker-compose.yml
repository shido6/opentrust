version: "3.9"

services:
  trust-api:
    build:
      context: ../trust-api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://opentrust:opentrust@db:5432/opentrust
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS:-}
      - OBSERVABILITY_BACKEND=${OBSERVABILITY_BACKEND:-local}
      - DEPLOYMENT_ENVIRONMENT=${DEPLOYMENT_ENVIRONMENT:-dev}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - API_KEY=${API_KEY:-dev-api-key}
      - API_KEYS=${API_KEYS:-}
      - VELOCITY_BACKEND=${VELOCITY_BACKEND:-memory}
      - REDIS_URL=${REDIS_URL:-redis://localhost:6379/0}
      - STIR_SHAKEN_VERIFY_MODE=${STIR_SHAKEN_VERIFY_MODE:-attestation_only}
      - REDRESS_WEBHOOK_URL=${REDRESS_WEBHOOK_URL:-}
      - NLP_PROVIDER=${NLP_PROVIDER:-local}
      - NLP_MODEL=${NLP_MODEL:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - VULTR_API_KEY=${VULTR_API_KEY:-}
      - VULTR_INFERENCE_URL=${VULTR_INFERENCE_URL:-}
    depends_on:
      db:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=opentrust
      - POSTGRES_PASSWORD=opentrust
      - POSTGRES_DB=opentrust
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opentrust"]
      interval: 10s
      timeout: 5s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel-collector.yml:/etc/otel-collector.yml
    command: ["--config", "/etc/otel-collector.yml"]

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - promdata:/prometheus

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - ../dashboards/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pgdata:
  promdata:
  grafana-data:
