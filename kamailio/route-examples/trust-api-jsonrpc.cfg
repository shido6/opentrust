# Alternative: JSON-RPC based trust API lookup
# Uses jsonrpcs module for cleaner request/response handling

loadmodule "jsonrpcs.so"
loadmodule "http_client.so"

jsonrpc[trust_api] {
    url = "http://trust-api:8000/v1/decision";
    method = "POST";
    content_type = "application/json";
}

route[TRUST_CHECK_JSONRPC] {
    # Build request using jsonrpcs
    $var(jsonrpc_payload) = "{
        \"jsonrpc\": \"2.0\",
        \"method\": \"decide\",
        \"params\": {
            \"call_id\": \"$ci\",
            \"from_number\": \"$fU\",
            \"to_number\": \"$rU\",
            \"source_ip\": \"$si\"
        },
        \"id\": 1
    }";

    jsonrpcs_send("trust_api", $var(jsonrpc_payload), "$var(result)");

    xlog("L_INFO", "JSON-RPC result: $var(result)\n");
}
