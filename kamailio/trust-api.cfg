#!KAMAILIO
#
# OpenTrust SIP — Kamailio Trust API integration (v2 with JSON parsing)
# Place in /etc/kamailio/kamailio.cfg
#

#!define WITH_OPEN_TRUST
#!define DB_URL "postgresql://opentrust:opentrust@localhost/opentrust"

####### Global Parameters #########

#!ifdef WITH_OPEN_TRUST
loadmodule "xhttp.so"
loadmodule "jsonrpcs.so"
loadmodule "http_client.so"
loadmodule "jansson.so"
loadmodule "db_postgres.so"
loadmodule "auth.so"
loadmodule "auth_db.so"
loadmodule "sl.so"
loadmodule "tm.so"
loadmodule "rr.so"
loadmodule "textops.so"
loadmodule "xlog.so"
#!endif

####### Routing Logic ########

request_route {
    # Per-INVITE trust check
    if (is_method("INVITE") && !has_totag()) {
        route(TRUST_CHECK);
    }

    route(RELAY);
}

route[TRUST_CHECK] {
    $var(api_url) = "http://trust-api:8000/v1/decision";
    $var(api_key) = "change-me-in-production";
    $var(timeout) = 2000;  # ms — fail open on timeout

    # Build JSON payload using jansson
    jansson_set("string", "call_id", "$ci", "$var(json)");
    jansson_set("string", "from_number", "$fU", "$var(json)");
    jansson_set("string", "to_number", "$rU", "$var(json)");
    jansson_set("string", "source_ip", "$si", "$var(json)");
    jansson_set("string", "source_carrier", "detected", "$var(json)");
    jansson_set("string", "stir_shaken", "$var(stir_result)", "$var(json)");
    jansson_set("string", "user_agent", "$(hdr(User-Agent){s.escape})", "$var(json)");
    jansson_set("string", "timestamp", "$timef(%Y-%m-%dT%H:%M:%SZ)", "$var(json)");

    # HTTP POST to Trust API with timeout
    http_client_query("POST", "$var(api_url)", "$var(json)",
        "$var(resp_body)", "$var(resp_headers)",
        "Content-Type: application/json\r\nX-API-Key: $var(api_key)\r\n",
        "$var(http_ok)", "$var(timeout)");

    # Fail open: if API is unreachable, log and allow through
    if (!$var(http_ok)) {
        xlog("L_WARN", "TRUST: API unreachable, allowing through (call $ci)\n");
        return;
    }

    # Parse decision from JSON response
    jansson_get("decision", "$var(resp_body)", "$var(decision)");
    jansson_get("trust_score", "$var(resp_body)", "$var(trust_score)");
    jansson_get("redress_required", "$var(resp_body)", "$var(redress)");

    xlog("L_INFO", "TRUST: call $ci decision=$var(decision) score=$var(trust_score) redress=$var(redress)\n");

    switch ($var(decision)) {
        case "allow":
            return;
        case "warn":
            append_to_reply("Warning: 399 opentrust \"Low trust score $var(trust_score)/100\"");
            return;
        case "challenge":
            $du = "sip:asterisk-ivr.internal:5060";
            route(RELAY);
            exit;
        case "voicemail":
            $du = "sip:asterisk-vm.internal:5060";
            route(RELAY);
            exit;
        case "rate_limit":
            sl_send_reply(503, "Service Unavailable");
            exit;
        case "block_dno":
            sl_send_reply(403, "Forbidden");
            exit;
        case "block_analytics":
            sl_send_reply(603, "Decline");
            exit;
        default:
            xlog("L_WARN", "TRUST: unknown decision '$var(decision)', allowing\n");
            return;
    }
}

route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
}
