#!KAMAILIO
#
# OpenTrust SIP — Kamailio Trust API integration
# Place in /etc/kamailio/kamailio.cfg
#

#!define WITH_OPEN_TRUST
#!define DB_URL "postgresql://opentrust:opentrust@localhost/opentrust"

####### Global Parameters #########

#!ifdef WITH_OPEN_TRUST
loadmodule "xhttp.so"
loadmodule "jsonrpcs.so"
loadmodule "http_client.so"
loadmodule "db_postgres.so"
loadmodule "auth.so"
loadmodule "auth_db.so"
#!endif

####### Routing Logic ########

request_route {
    # Per-INVITE trust check
    if (is_method("INVITE") && !has_totag()) {
        route(TRUST_CHECK);
    }

    route(RELAY);
}

route[TRUST_CHECK] {
    $var(api_url) = "http://trust-api:8000/v1/decision";
    $var(api_key) = "your-api-key-here";

    # Build JSON payload
    $var(json_body) = "{";
    $var(json_body) = $var(json_body) + "\"call_id\":\"" + $ci + "\"";
    $var(json_body) = $var(json_body) + ",\"from_number\":\"" + $fU + "\"";
    $var(json_body) = $var(json_body) + ",\"to_number\":\"" + $rU + "\"";
    $var(json_body) = $var(json_body) + ",\"source_ip\":\"" + $si + "\"";
    $var(json_body) = $var(json_body) + ",\"source_carrier\":\"detected\"";
    $var(json_body) = $var(json_body) + ",\"stir_shaken\":\"unknown\"";
    $var(json_body) = $var(json_body) + ",\"user_agent\":\"" + $(hdr(User-Agent)) + "\"";
    $var(json_body) = $var(json_body) + ",\"timestamp\":\"" + $timef(%Y-%m-%dT%H:%M:%SZ) + "\"";
    $var(json_body) = $var(json_body) + "}";

    # HTTP POST to Trust API
    http_client_query("POST", $var(api_url), $var(json_body), "$var(resp_body)", "$var(resp_headers)", "Content-Type: application/json\r\nX-API-Key: $var(api_key)\r\n");

    # Parse response (simplified — production should use JSON parser module)
    if ($var(resp_body) ~= "\"decision\":\"allow\"") {
        route(LOG_ALLOW);
        return;
    }

    if ($var(resp_body) ~= "\"decision\":\"warn\"") {
        append_to_reply("Warning: 399 opentrust \"Low trust score\"");
        route(LOG_ALLOW);
        return;
    }

    if ($var(resp_body) ~= "\"decision\":\"challenge\"") {
        $du = "sip:asterisk-ivr.internal:5060";
        route(RELAY);
        exit;
    }

    if ($var(resp_body) ~= "\"decision\":\"voicemail\"") {
        $du = "sip:asterisk-vm.internal:5060";
        route(RELAY);
        exit;
    }

    if ($var(resp_body) ~= "\"decision\":\"rate_limit\"") {
        sl_send_reply(503, "Service Unavailable");
        exit;
    }

    if ($var(resp_body) ~= "\"decision\":\"block_dno\"") {
        sl_send_reply(403, "Forbidden");
        exit;
    }

    if ($var(resp_body) ~= "\"decision\":\"block_analytics\"") {
        sl_send_reply(603, "Decline");
        exit;
    }

    # Default: allow through
    return;
}

route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
}

route[LOG_ALLOW] {
    xlog("L_INFO", "TRUST: allow call $ci from $fU to $rU\n");
}
